<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎡 CS Lucky Spin Challenge</title>
<style>
  :root{
    --bg1:#1b1037; --bg2:#2a0e4a; --accent1:#ff5d8f; --accent2:#36e0c1; --accent3:#ffd23f;
    --accent4:#7c6bff; --card:#241449; --text:#fff7f0; --green:#34d399; --red:#ff6b6b;
  }
  body.light{
    --bg1:#fef6ff; --bg2:#fde7ff; --card:#ffffff; --text:#2a1140;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    font-family:'Trebuchet MS','Segoe UI',sans-serif;
    background:radial-gradient(circle at 20% 20%, var(--bg2), var(--bg1) 70%);
    color:var(--text);
    min-height:100vh; overflow-x:hidden;
    transition:background .4s,color .4s;
  }
  .screen{display:none; min-height:100vh; flex-direction:column; align-items:center; justify-content:center; padding:24px; text-align:center;}
  .screen.active{display:flex;}

  h1.title{
    font-size:clamp(2rem,5vw,3.4rem); margin:6px 0 18px;
    background:linear-gradient(90deg,var(--accent1),var(--accent3),var(--accent2));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 4px 18px rgba(0,0,0,.25);
  }

  .topbar{position:fixed; top:10px; right:10px; display:flex; gap:8px; z-index:50; flex-wrap:wrap; justify-content:flex-end;}
  .iconbtn{
    background:var(--card); border:2px solid var(--accent4); color:var(--text);
    border-radius:50px; padding:8px 14px; font-size:1.1rem; cursor:pointer;
    box-shadow:0 4px 10px rgba(0,0,0,.25); transition:transform .15s;
  }
  .iconbtn:hover{transform:scale(1.08);}

  .progress-pill{
    position:fixed; top:10px; left:10px; background:var(--card); border:2px solid var(--accent2);
    border-radius:50px; padding:8px 16px; font-weight:bold; font-size:1rem; box-shadow:0 4px 10px rgba(0,0,0,.25);
    z-index:50;
  }

  canvas#wheelCanvas{max-width:90vw; touch-action:none;}
  .wheel-wrap{position:relative; display:flex; align-items:center; justify-content:center;}
  .pointer{
    position:absolute; top:-6px; left:50%; transform:translateX(-50%);
    width:0; height:0; border-left:22px solid transparent; border-right:22px solid transparent;
    border-top:38px solid var(--accent3); filter:drop-shadow(0 3px 4px rgba(0,0,0,.4)); z-index:5;
  }

  .bigbtn{
    font-size:clamp(1.4rem,3vw,2.2rem); font-weight:900; letter-spacing:1px;
    padding:18px 48px; margin-top:26px; border:none; border-radius:60px; cursor:pointer; color:#1c0b30;
    background:linear-gradient(135deg,var(--accent3),var(--accent1));
    box-shadow:0 10px 0 #b5285a, 0 14px 24px rgba(0,0,0,.35);
    transition:transform .12s, box-shadow .12s;
  }
  .bigbtn:active{transform:translateY(8px); box-shadow:0 2px 0 #b5285a, 0 6px 10px rgba(0,0,0,.3);}
  .bigbtn.secondary{background:linear-gradient(135deg,var(--accent2),var(--accent4)); box-shadow:0 10px 0 #1f8f78, 0 14px 24px rgba(0,0,0,.35);}
  .bigbtn.secondary:active{box-shadow:0 2px 0 #1f8f78, 0 6px 10px rgba(0,0,0,.3);}
  .btnrow{display:flex; gap:20px; flex-wrap:wrap; justify-content:center;}

  .challenger-card{
    background:var(--card); border-radius:28px; padding:34px 50px; margin-top:10px;
    box-shadow:0 14px 40px rgba(0,0,0,.35); animation:pop .5s ease;
    border:3px solid var(--accent3);
  }
  .challenger-name{font-size:clamp(1.8rem,5vw,3rem); font-weight:900; color:var(--accent3); margin-top:8px;}

  @keyframes pop{0%{transform:scale(.4); opacity:0;}70%{transform:scale(1.08);}100%{transform:scale(1); opacity:1;}}

  .countdown-num{
    font-size:clamp(6rem,22vw,14rem); font-weight:900; color:var(--accent1);
    text-shadow:0 0 40px var(--accent1); animation:bounce .9s ease;
  }
  @keyframes bounce{0%{transform:scale(.3); opacity:0;}50%{transform:scale(1.3);}100%{transform:scale(1); opacity:1;}}

  .hype{font-size:1.5rem; font-weight:bold; color:var(--accent2); margin-bottom:6px; animation:fadeIn .4s ease;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(-10px);} to{opacity:1; transform:translateY(0);}}

  .question-card{
    background:var(--card); border-radius:26px; padding:36px; max-width:780px; width:90%;
    box-shadow:0 14px 40px rgba(0,0,0,.35); border:3px solid var(--accent4);
  }
  .question-meta{font-size:1rem; opacity:.75; margin-bottom:10px; font-weight:bold;}
  .question-text{font-size:clamp(1.3rem,3vw,1.9rem); font-weight:700; line-height:1.4; margin-bottom:22px;}
  textarea#answerBox{
    width:100%; min-height:90px; font-size:1.2rem; border-radius:16px; padding:14px;
    border:2px solid var(--accent4); resize:vertical; font-family:inherit;
  }
  label.field-label{display:block; text-align:left; font-weight:bold; margin-bottom:6px; opacity:.85;}

  .result-emoji{font-size:5rem; animation:wiggle 1s ease infinite;}
  @keyframes wiggle{0%,100%{transform:rotate(-6deg);}50%{transform:rotate(6deg);}}
  .result-title{font-size:clamp(2rem,5vw,3rem); font-weight:900; margin:10px 0;}
  .result-title.correct{color:var(--green); text-shadow:0 0 30px var(--green);}
  .result-title.wrong{color:var(--accent3); text-shadow:0 0 30px var(--accent3);}
  .result-sub{font-size:1.3rem; margin-bottom:6px;}
  .answer-reveal{font-size:1.5rem; font-weight:bold; color:var(--accent1); margin-top:8px;}

  .glow-green{box-shadow:0 0 60px 10px var(--green) !important;}

  .modal-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center; z-index:200;
  }
  .modal-box{
    background:var(--card); border-radius:22px; padding:30px; max-width:420px; width:90%; text-align:center;
    border:3px solid var(--accent3); box-shadow:0 20px 50px rgba(0,0,0,.5);
  }
  .modal-box input{width:100%; font-size:1.2rem; padding:12px; border-radius:12px; border:2px solid var(--accent4); margin:14px 0; font-family:inherit;}

  #confettiCanvas{position:fixed; inset:0; pointer-events:none; z-index:300;}

  .small-link{margin-top:18px; font-size:.95rem; opacity:.7; cursor:pointer; text-decoration:underline; background:none; border:none; color:inherit;}
  footer.credit{position:fixed; bottom:6px; font-size:.75rem; opacity:.4;}
</style>
</head>
<body>

<div class="topbar">
  <button class="iconbtn" id="musicToggle" title="Background music">🎵 On</button>
  <button class="iconbtn" id="sfxToggle" title="Sound effects">🔊 On</button>
  <button class="iconbtn" id="fsToggle" title="Fullscreen">⛶</button>
  <button class="iconbtn" id="darkToggle" title="Dark mode">🌙</button>
</div>
<div class="progress-pill" id="progressPill">Questions Used 0 / 27</div>

<canvas id="confettiCanvas"></canvas>

<!-- SCREEN: HOME / WHEEL -->
<section class="screen active" id="screen-home">
  <h1 class="title">🎡 CS Lucky Spin Challenge</h1>
  <div class="wheel-wrap">
    <div class="pointer"></div>
    <canvas id="wheelCanvas" width="560" height="560"></canvas>
  </div>
  <button class="bigbtn" id="spinBtn">🎯 SPIN</button>
</section>

<!-- SCREEN: CHALLENGER -->
<section class="screen" id="screen-challenger">
  <div class="challenger-card">
    <div style="font-size:1.4rem;">🎉 Today's Challenger</div>
    <div class="challenger-name" id="challengerName">—</div>
  </div>
</section>

<!-- SCREEN: COUNTDOWN -->
<section class="screen" id="screen-countdown">
  <div class="countdown-num" id="countdownNum">10</div>
</section>

<!-- SCREEN: QUESTION -->
<section class="screen" id="screen-question">
  <div class="hype" id="hypeMsg">Let's Go!</div>
  <div class="question-card">
    <div class="question-meta" id="questionMeta">One-word</div>
    <div class="question-text" id="questionText">Question goes here</div>
    <label class="field-label" for="answerBox">Your Answer</label>
    <textarea id="answerBox" placeholder="Type the answer here..."></textarea>

      <button class="bigbtn" id="submitBtn">SUBMIT</button>

</section>

<!-- SCREEN: RESULT -->

  <div class="result-emoji" id="resultEmoji">🎉</div>
  <div class="result-title" id="resultTitle">Correct!!</div>
  <div class="result-sub" id="resultSub1">⭐ Excellent!</div>
  <div class="result-sub" id="resultSub2">🏆 Fantastic Job!</div>
  <div class="answer-reveal" id="answerReveal" style="display:none;"></div>
  <div class="btnrow" style="margin-top:28px;">
    <button class="bigbtn" id="spinAgainBtn">🎡 Spin Again</button>
    <button class="bigbtn secondary" id="homeBtn">🏠 Home</button>

</section>

<!-- TEACHER ANSWER MODAL -->
<div class="modal-overlay" id="teacherModal" style="display:none;">
  <div class="modal-box">
    <div style="font-size:1.3rem; font-weight:bold;">👩‍🏫 Teacher Only</div>
    <p style="opacity:.8;">Enter the correct answer</p>
    <input type="text" id="teacherAnswerInput" placeholder="Correct answer...">
    <button class="bigbtn" id="teacherConfirmBtn" style="margin-top:4px; padding:12px 30px; font-size:1.1rem;">Check Answer</button>
  </div>
</div>

<footer class="credit">CS Lucky Spin Challenge · Offline Classroom Game</footer>

<script>
/* =====================================================
   DATA: Student names
===================================================== */
const students = [
"AADITRI PERIWAL","AANYA ANAND","AARADHYA GUPTA","AHAAN SHAH","ARMAAN AGARWAL",
"ARNAV PITAMBER KHANDELWAL","ARUNIMA JAITAWAT","ASHVVIK DUTTA","ATHARV JHAWAR","ATHARVV DUTTA",
"KRISHA KATARIA","MALHAAR MALHOTRA","PRISHA BINDRANI","RUDRA AGGARWAL","SHAURYA GUPTA",
"SIDDHARTHA AGARWAL","VAISHNAVI PITAMBER KHANDELWAL","VIHAAN LUNIA","VISHRUTH JAIN","AADYA AGARWAL",
"Amaira","DEA BHARGAVA","DHRUVIN KISHORE","Harshwrdhan","MIHIRA KASLIWAL","MIRAYA RUIA","RAGHAV GANDHI"
];

/* =====================================================
   DATA: Question bank
   Topic 2.1 Types and methods of data transmission
   (data packets, CRC, packet switching, simplex/half/full
   duplex, serial/parallel transmission, USB)
===================================================== */
const questionBank = [
  // --- One word / fill in the blank ---
  {type:"One-word", q:"What does USB stand for?", a:"Universal Serial Bus"},
  {type:"One-word", q:"What does CRC stand for?", a:"Cyclic Redundancy Check"},
  {type:"One-word", q:"What is the smallest unit into which data is divided before transmission called?", a:"Packet"},
  {type:"Fill in the blank", q:"A data packet is made up of a header, the payload (data), and a _______.", a:"Trailer"},
  {type:"Fill in the blank", q:"The part of a packet that contains the sender and receiver IP addresses is called the _______.", a:"Header"},
  {type:"Fill in the blank", q:"The technique of breaking data into packets, sending them independently and reassembling them at the destination is called _______.", a:"Packet switching"},
  {type:"Fill in the blank", q:"A method used to detect errors in transmitted data by performing a calculation on the data is called a _______.", a:"Cyclic Redundancy Check (CRC)"},
  {type:"One-word", q:"What type of transmission sends data one bit at a time?", a:"Serial"},
  {type:"One-word", q:"What type of transmission sends multiple bits at the same time down separate wires?", a:"Parallel"},
  {type:"Fill in the blank", q:"A type of transmission where data can only travel in one direction is called _______.", a:"Simplex"},
  {type:"Fill in the blank", q:"A type of transmission where data can travel in both directions, but not at the same time, is called _______.", a:"Half-duplex"},
  {type:"Fill in the blank", q:"A type of transmission where data can travel in both directions at the same time is called _______.", a:"Full-duplex"},
  {type:"One-word", q:"Which type of transmission is most commonly used over long distances because it reduces data skew?", a:"Serial"},
  {type:"One-word", q:"What term describes the problem in parallel transmission where bits travelling down different wires arrive at slightly different times?", a:"Data skew"},
  {type:"One-word", q:"What is the standard interface used to connect peripheral devices like keyboards, mice and printers to a computer?", a:"USB"},
  {type:"Fill in the blank", q:"USB transmits data using _______ transmission (one bit at a time).", a:"Serial"},
  {type:"One-word", q:"What term describes a device automatically being detected and configured by the operating system when connected via USB?", a:"Plug and play"},
  {type:"Fill in the blank", q:"USB devices can supply electrical _______ to a connected device through the cable.", a:"Power"},
  {type:"One-word", q:"What do we call the number identifying the destination computer on a network, included in a packet header?", a:"IP address"},
  {type:"Fill in the blank", q:"If a CRC check shows the received data does not match, the receiver will normally request a _______ of the data.", a:"Retransmission"},

  // --- True / False ---
  {type:"True/False", q:"True or False: Packets have a header containing the sender and receiver IP addresses.", a:"True"},
  {type:"True/False", q:"True or False: Packets do not require any error checking.", a:"False"},
  {type:"True/False", q:"True or False: USB uses protocols to ensure reliable, error-free transmission.", a:"True"},
  {type:"True/False", q:"True or False: Serial transmission suffers from data skew more than parallel transmission.", a:"False"},
  {type:"True/False", q:"True or False: USB cables are typically limited to around 5 metres or less for reliable transmission.", a:"True"},
  {type:"True/False", q:"True or False: Simplex transmission means data can travel in both directions.", a:"False"},
  {type:"True/False", q:"True or False: Full duplex transmission allows simultaneous two-way communication.", a:"True"},
  {type:"True/False", q:"True or False: USB transmits data using parallel transmission.", a:"False"},
  {type:"True/False", q:"True or False: Packet switching guarantees that no packet will ever be lost.", a:"False"},
  {type:"True/False", q:"True or False: A CRC value is calculated and sent along with the data so the receiver can check for errors.", a:"True"},
  {type:"True/False", q:"True or False: In half-duplex transmission, both devices can send data at exactly the same time.", a:"False"},
  {type:"True/False", q:"True or False: Parallel transmission can be faster over short distances because multiple bits travel at once.", a:"True"},
  {type:"True/False", q:"True or False: Packets sent over a network can take different routes to reach the same destination.", a:"True"},
  {type:"True/False", q:"True or False: The payload of a packet is the part used purely for addressing.", a:"False"}
];

let shuffledQuestions = [];
let usedCount = 0;
function reshuffle(){
  shuffledQuestions = [...questionBank].sort(()=>Math.random()-0.5);
  usedCount = 0;
}
reshuffle();
function nextQuestion(){
  if(usedCount >= shuffledQuestions.length){ reshuffle(); }
  const q = shuffledQuestions[usedCount];
  usedCount++;
  updateProgress();
  return q;
}
function updateProgress(){
  document.getElementById('progressPill').textContent = `Questions Used ${usedCount} / ${questionBank.length}`;
}

/* =====================================================
   SCREEN NAVIGATION
===================================================== */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* =====================================================
   AUDIO (Web Audio API — generated sounds, no files)
===================================================== */
let audioCtx = null;
let sfxOn = true, musicOn = true;
let musicNodes = null;

function ensureAudio(){
  if(!audioCtx){ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
  if(audioCtx.state === 'suspended'){ audioCtx.resume(); }
}

function tone(freq, dur, type='sine', vol=0.2, delay=0){
  if(!sfxOn || !audioCtx) return;
  const t0 = audioCtx.currentTime + delay;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type; osc.frequency.value = freq;
  gain.gain.setValueAtTime(0, t0);
  gain.gain.linearRampToValueAtTime(vol, t0+0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(t0); osc.stop(t0+dur+0.02);
}

function playTick(){ tone(1200,0.05,'square',0.12); }

function playTickingSequence(durationSec){
  if(!sfxOn || !audioCtx) return;
  let interval = 60; const start = audioCtx.currentTime; let elapsed=0;
  const id = setInterval(()=>{
    if(!sfxOn) return;
    playTick();
    elapsed += interval;
    if(elapsed >= durationSec*1000){ clearInterval(id); }
  }, interval);
  return id;
}

function playDramaticTick(){ tone(440,0.15,'square',0.25); tone(220,0.15,'square',0.15,0.02); }

function playCheer(){
  [523,659,784,1046].forEach((f,i)=>tone(f,0.3,'triangle',0.2,i*0.12));
}
function playBoing(){
  if(!sfxOn || !audioCtx) return;
  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type='sine';
  osc.frequency.setValueAtTime(500,t0);
  osc.frequency.exponentialRampToValueAtTime(80,t0+0.35);
  gain.gain.setValueAtTime(0.25,t0);
  gain.gain.exponentialRampToValueAtTime(0.001,t0+0.4);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(t0); osc.stop(t0+0.42);
}

function startMusic(){
  if(!audioCtx || !musicOn) return;
  stopMusic();
  const notes = [261,329,392,329];
  let idx = 0;
  const gainMaster = audioCtx.createGain();
  gainMaster.gain.value = 0.05;
  gainMaster.connect(audioCtx.destination);
  const id = setInterval(()=>{
    if(!musicOn) return;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type='triangle'; osc.frequency.value = notes[idx % notes.length];
    g.gain.setValueAtTime(0.0, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime+0.05);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.5);
    osc.connect(g); g.connect(gainMaster);
    osc.start(); osc.stop(audioCtx.currentTime+0.55);
    idx++;
  }, 600);
  musicNodes = {id, gainMaster};
}
function stopMusic(){
  if(musicNodes){ clearInterval(musicNodes.id); musicNodes=null; }
}

document.getElementById('musicToggle').addEventListener('click', e=>{
  ensureAudio();
  musicOn = !musicOn;
  e.target.textContent = musicOn ? '🎵 On' : '🎵 Off';
  if(musicOn) startMusic(); else stopMusic();
});
document.getElementById('sfxToggle').addEventListener('click', e=>{
  sfxOn = !sfxOn;
  e.target.textContent = sfxOn ? '🔊 On' : '🔇 Off';
});
document.getElementById('fsToggle').addEventListener('click', ()=>{
  if(!document.fullscreenElement){ document.documentElement.requestFullscreen().catch(()=>{}); }
  else { document.exitFullscreen(); }
});
document.getElementById('darkToggle').addEventListener('click', e=>{
  document.body.classList.toggle('light');
  e.target.textContent = document.body.classList.contains('light') ? '☀️' : '🌙';
});

/* =====================================================
   WHEEL (Canvas)
===================================================== */
const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');
const colors = ['#ff5d8f','#36e0c1','#ffd23f','#7c6bff','#ff8a5b','#5ad1ff','#c66bff','#9be564'];
let wheelRotation = 0;
let spinning = false;

function drawWheel(rotation){
  const cx = canvas.width/2, cy = canvas.height/2, r = cx - 10;
  const n = students.length;
  const arc = (Math.PI*2)/n;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(rotation);
  for(let i=0;i<n;i++){
    const start = i*arc, end = start+arc;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.arc(0,0,r,start,end);
    ctx.closePath();
    ctx.fillStyle = colors[i % colors.length];
    ctx.fill();
    ctx.save();
    ctx.rotate(start + arc/2);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#1c0b30';
    ctx.font = 'bold 13px Trebuchet MS, sans-serif';
    let label = students[i];
    if(label.length > 18) label = label.slice(0,17)+'…';
    ctx.fillText(label, r-12, 5);
    ctx.restore();
  }
  ctx.restore();
  // hub
  ctx.beginPath();
  ctx.arc(cx,cy,34,0,Math.PI*2);
  ctx.fillStyle = '#ffd23f';
  ctx.fill();
  ctx.strokeStyle = '#1c0b30'; ctx.lineWidth = 4; ctx.stroke();
  ctx.fillStyle = '#1c0b30';
  ctx.font='bold 24px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🎯', cx, cy);
}
drawWheel(0);

function easeOutCubic(t){ return 1 - Math.pow(1-t,3); }

function spinWheel(){
  if(spinning) return;
  ensureAudio();
  spinning = true;
  const duration = 5000 + Math.random()*2000; // 5-7s
  const extraSpins = 6 + Math.random()*3;
  const finalIndex = Math.floor(Math.random()*students.length);
  const arc = (Math.PI*2)/students.length;
  // pointer is at top (angle = -PI/2 from center, i.e. rotation offset)
  const targetSliceCenter = finalIndex*arc + arc/2;
  const targetRotation = (Math.PI*2*extraSpins) + (Math.PI*2 - targetSliceCenter) - Math.PI/2 + (Math.random()-0.5)*arc*0.5;
  const startRotation = wheelRotation % (Math.PI*2);
  const start = performance.now();
  const tickId = playTickingSequence(duration/1000);

  function frame(now){
    const elapsed = now - start;
    const t = Math.min(elapsed/duration,1);
    const eased = easeOutCubic(t);
    wheelRotation = startRotation + eased*targetRotation;
    drawWheel(wheelRotation);
    if(t < 1){
      requestAnimationFrame(frame);
    } else {
      spinning = false;
      onSpinComplete(finalIndex);
    }
  }
  requestAnimationFrame(frame);
}

function onSpinComplete(index){
  const name = students[index];
  document.getElementById('challengerName').textContent = name;
  showScreen('screen-challenger');
  playCheer();
  launchConfetti(1200);
  setTimeout(()=>{ startCountdown(); }, 2200);
}

document.getElementById('spinBtn').addEventListener('click', ()=>{
  ensureAudio();
  if(musicOn) startMusic();
  spinWheel();
});

/* =====================================================
   COUNTDOWN
===================================================== */
function startCountdown(){
  showScreen('screen-countdown');
  let n = 3;
  const el = document.getElementById('countdownNum');
  el.textContent = n;
  playDramaticTick();
  const id = setInterval(()=>{
    n--;
    if(n <= 0){
      clearInterval(id);
      startQuestion();
      return;
    }
    el.textContent = n;
    el.style.animation = 'none';
    void el.offsetWidth;
    el.style.animation = 'bounce 0.9s ease';
    playDramaticTick();
  }, 800);
}

/* =====================================================
   QUESTION ROUND
===================================================== */
const hypeMessages = ["Let's Go!","You're on Fire!","Brain Power!","Can you crack it?","Computer Science Champion!"];
let currentQuestion = null;

function startQuestion(){
  currentQuestion = nextQuestion();
  document.getElementById('hypeMsg').textContent = hypeMessages[Math.floor(Math.random()*hypeMessages.length)];
  document.getElementById('questionMeta').textContent = currentQuestion.type;
  document.getElementById('questionText').textContent = currentQuestion.q;
  document.getElementById('answerBox').value = '';
  showScreen('screen-question');
}

document.getElementById('submitBtn').addEventListener('click', ()=>{
  document.getElementById('teacherAnswerInput').value = '';
  document.getElementById('teacherModal').style.display = 'flex';
  setTimeout(()=>document.getElementById('teacherAnswerInput').focus(),50);
});

document.getElementById('teacherConfirmBtn').addEventListener('click', checkAnswer);
document.getElementById('teacherAnswerInput').addEventListener('keydown', e=>{
  if(e.key === 'Enter') checkAnswer();
});

function normalize(s){
  return s.trim().toLowerCase().replace(/\s+/g,' ');
}

function checkAnswer(){
  const teacherAnswer = document.getElementById('teacherAnswerInput').value;
  if(!teacherAnswer.trim()) return;
  document.getElementById('teacherModal').style.display = 'none';
  const studentAnswer = document.getElementById('answerBox').value;
  const correct = normalize(studentAnswer) === normalize(teacherAnswer);
  showResult(correct, teacherAnswer);
}

function showResult(correct, teacherAnswer){
  const card = document.querySelector('#screen-result');
  const titleEl = document.getElementById('resultTitle');
  const emojiEl = document.getElementById('resultEmoji');
  const sub1 = document.getElementById('resultSub1');
  const sub2 = document.getElementById('resultSub2');
  const reveal = document.getElementById('answerReveal');

  if(correct){
    emojiEl.textContent = '🎉';
    titleEl.textContent = 'Correct!!';
    titleEl.className = 'result-title correct';
    sub1.textContent = '⭐ Excellent!';
    sub2.textContent = '🏆 Fantastic Job!';
    reveal.style.display = 'none';
    playCheer();
    launchConfetti(1600);
  } else {
    emojiEl.textContent = '😂';
    titleEl.textContent = 'Oops! Nice Try!';
    titleEl.className = 'result-title wrong';
    sub1.textContent = 'The correct answer was:';
    sub2.textContent = '';
    reveal.style.display = 'block';
    reveal.textContent = teacherAnswer;
    playBoing();
  }
  showScreen('screen-result');
}

document.getElementById('spinAgainBtn').addEventListener('click', ()=>{
  showScreen('screen-home');
  setTimeout(spinWheel, 300);
});
document.getElementById('homeBtn').addEventListener('click', ()=>{
  showScreen('screen-home');
});

/* =====================================================
   CONFETTI
===================================================== */
const confettiCanvas = document.getElementById('confettiCanvas');
const cctx = confettiCanvas.getContext('2d');
function resizeConfetti(){ confettiCanvas.width = window.innerWidth; confettiCanvas.height = window.innerHeight; }
resizeConfetti();
window.addEventListener('resize', resizeConfetti);

let confettiParticles = [];
function launchConfetti(count){
  for(let i=0;i<count/8;i++){
    confettiParticles.push({
      x: Math.random()*confettiCanvas.width,
      y: -20 - Math.random()*200,
      vx: (Math.random()-0.5)*4,
      vy: 2 + Math.random()*4,
      size: 6+Math.random()*6,
      color: colors[Math.floor(Math.random()*colors.length)],
      rot: Math.random()*Math.PI*2,
      vrot: (Math.random()-0.5)*0.3,
      life: 0,
      maxLife: 160+Math.random()*60
    });
  }
}
function confettiLoop(){
  cctx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);
  confettiParticles.forEach(p=>{
    p.x += p.vx; p.y += p.vy; p.vy += 0.03; p.rot += p.vrot; p.life++;
    cctx.save();
    cctx.translate(p.x,p.y);
    cctx.rotate(p.rot);
    cctx.fillStyle = p.color;
    cctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.6);
    cctx.restore();
  });
  confettiParticles = confettiParticles.filter(p=>p.life < p.maxLife && p.y < confettiCanvas.height+40);
  requestAnimationFrame(confettiLoop);
}
confettiLoop();

/* init progress display */
updateProgress();
</script>
